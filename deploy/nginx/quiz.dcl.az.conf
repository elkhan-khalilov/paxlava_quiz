# quiz.dcl.az  ->  paxlava-quiz konteyneri (daxili port 8000)
#
# Bu faylı mövcud nginx-proxy konfiqlərinizin yanına qoyun
# (məsələn /etc/nginx/conf.d/quiz.dcl.az.conf) və nginx-i yeniləyin:
#   docker exec nginx-proxy nginx -t && docker exec nginx-proxy nginx -s reload
#
# QEYD: nginx-proxy konteyneri paxlava ilə eyni Docker şəbəkəsində olmalıdır
# ki, "paxlava-quiz" adını həll edə bilsin (bax: docker-compose.yml -> networks.proxy).

upstream paxlava_quiz {
    server paxlava-quiz:8000;
}

# HTTP -> HTTPS yönləndirmə (+ certbot üçün)
server {
    listen 80;
    listen [::]:80;
    server_name quiz.dcl.az;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;                     # köhnə nginx üçün: bunu silin və yuxarıda "ssl http2" yazın
    server_name quiz.dcl.az;

    # SSL sertifikatları — yolu mövcud dcl.az konfiqinizlə uyğunlaşdırın
    ssl_certificate     /etc/letsencrypt/live/quiz.dcl.az/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quiz.dcl.az/privkey.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://paxlava_quiz;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
