services:
  web:
    build: .
    image: paxlava-quiz
    ports:
      - "5000:5000"
    environment:
      # Override these in production. SECRET_KEY MUST be set to a random value.
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      USER_USERNAME: ${USER_USERNAME:-user}
      USER_PASSWORD: ${USER_PASSWORD:-user123}
      DATA_DIR: /app/data
    volumes:
      # Persists games.json / teams_list.json across container restarts.
      - quiz_data:/app/data
    restart: unless-stopped

volumes:
  quiz_data:
